<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>La Roca | Community Gym</title><meta name="description" content="La Roca community gym in La Entrada, María Trinidad Sánchez, Dominican Republic."><link rel="icon" href="assets/favicon.svg"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="css/style.css"></head><body>
<nav class="navbar navbar-expand-lg bg-white sticky-top border-bottom"><div class="container"><a class="navbar-brand fw-bold" href="#home">La Roca</a><button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button><div class="collapse navbar-collapse" id="nav"><ul class="navbar-nav ms-auto"><li><a class="nav-link" href="#home" data-i18n="nav.home"></a></li><li><a class="nav-link" href="#about" data-i18n="nav.about"></a></li><li><a class="nav-link" href="#facilities" data-i18n="nav.facilities"></a></li><li><a class="nav-link" href="#pricing" data-i18n="nav.pricing"></a></li><li><a class="nav-link" href="#contact" data-i18n="nav.contact"></a></li></ul><button id="languageToggle" class="btn btn-sm btn-outline-success ms-lg-3">ES</button></div></div></nav>
<main>
<section id="home" class="hero">
  <div class="container">
    <div class="row align-items-center g-4">

      <div class="col-lg-7">
        <span class="eyebrow" data-i18n="hero.eyebrow"></span>

        <h1 class="display-2 fw-bold">La Roca</h1>

      </div>

      <div class="col-lg-5">
        <div
          id="statusCard"
          class="status-card"
          data-status="open">

          <div class="status-topline">
            <span class="status-dot"></span>
            <span data-i18n="status.live"></span>
          </div>

          <div
            id="statusLabel"
            class="status-label">
            OPEN
          </div>

          <p
            id="statusMessage"
            class="status-message">
          </p>

          <div class="status-meta">
            <div>
              <span data-i18n="status.todayHours"></span>
              <strong id="todayHours">—</strong>
            </div>

            <div>
              <span data-i18n="status.updated"></span>
              <strong
                id="lastUpdated"
                data-i18n="status.automatic">
              </strong>
            </div>
          </div>
        </div>

        <div
          id="announcementBanner"
          class="announcement d-none mt-3">

          <strong data-i18n="announcement.title"></strong>
          <span id="announcementText"></span>
        </div>
      </div>

    </div>
  </div>
</section>
<section id="about" class="section"><div class="container"><span class="eyebrow" data-i18n="about.eyebrow"></span><h2 data-i18n="about.title"></h2><div class="row g-4"><div class="col-lg-12"><p class="section-copy" data-i18n="about.body"></p></div></div></div></section>
<section id="facilities" class="section muted"><div class="container"><span class="eyebrow" data-i18n="facilities.eyebrow"></span><h2 data-i18n="facilities.title"></h2><p data-i18n="facilities.intro"></p><div class="row g-4 mt-2"><div class="col-md-4"><button class="gallery-card" data-gallery-index="0"><img src="assets/gym-placeholder-1.svg" alt=""><span><strong data-i18n="facilities.card1Title"></strong><small data-i18n="facilities.card1Text"></small></span></button></div><div class="col-md-4"><button class="gallery-card" data-gallery-index="1"><img src="assets/gym-placeholder-2.svg" alt=""><span><strong data-i18n="facilities.card2Title"></strong><small data-i18n="facilities.card2Text"></small></span></button></div><div class="col-md-4"><button class="gallery-card" data-gallery-index="2"><img src="assets/gym-placeholder-3.svg" alt=""><span><strong data-i18n="facilities.card3Title"></strong><small data-i18n="facilities.card3Text"></small></span></button></div></div></div></section>
<section id="pricing" class="section"><div class="container"><span class="eyebrow" data-i18n="pricing.eyebrow"></span><h2 data-i18n="pricing.title"></h2><div class="pricing-card"><div><div class="price">RD$100</div><div data-i18n="pricing.period"></div></div><div><p data-i18n="pricing.cash"></p><p class="mb-0" data-i18n="pricing.note"></p></div></div></div></section>
<section id="contact" class="section muted">
  <div class="container">

    <span
      class="eyebrow"
      data-i18n="contact.eyebrow">
    </span>

    <h2 data-i18n="contact.title"></h2>

    <div class="row g-4">

      <!-- Contact card -->
      <div class="col-lg-5">
        <div class="contact-card">

          <h3 data-i18n="location.full"></h3>

          <p data-i18n="contact.copy"></p>

          <div class="d-grid gap-2">

            <a
              id="contactWhatsApp"
              class="btn btn-success"
              href="YOUR_WHATSAPP_LINK"
              target="_blank"
              rel="noopener"
              data-i18n="actions.whatsapp">
            </a>

            <a
              id="contactMaps"
              class="btn btn-outline-success"
              href="YOUR_GOOGLE_MAPS_LINK"
              target="_blank"
              rel="noopener"
              data-i18n="actions.directions">
            </a>

          </div>
        </div>
      </div>

      <!-- Embedded Google Map -->
      <div class="col-lg-7">
        <div class="map-embed">

          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1879.8633882874171!2d-69.91264870930704!3d19.5533403029523!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8eae6900520ef537%3A0x145067ebb484383f!2sGimnasio%20Comunitario!5e0!3m2!1sen!2sdo!4v1784643769166!5m2!1sen!2sdo"
            width="100%"
            height="400"
            style="border:0;"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="strict-origin-when-cross-origin"
            title="La Roca on Google Maps">
          </iframe>

        </div>
      </div>

    </div>
  </div>
</section>
</main><footer><div class="container d-flex justify-content-between"><span>La Roca</span><span data-i18n="footer.text"></span></div></footer><a id="floatingWhatsApp" class="floating-wa"
   href="https://wa.me/18297757940"
   target="_blank"
   rel="noopener">>WA</a>
<div class="modal fade" id="galleryModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered modal-lg"><div class="modal-content"><div class="modal-header"><h5 id="galleryModalTitle"></h5><button class="btn-close" data-bs-dismiss="modal"></button></div><img id="galleryModalImage" class="w-100" alt=""></div></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script><script src="js/config.js"></script>
<script src="js/translations.js"></script>
<script src="js/schedule.js"></script>
<script type="module" src="js/firebase-public.js"></script>
<script src="js/app.js"></script></body></html>
